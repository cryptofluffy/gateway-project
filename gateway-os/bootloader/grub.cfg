# Gateway OS GRUB2 Configuration
# Boot configuration for UEFI systems

set timeout=10
set default=0

# Menu colors and theme
set color_normal=white/black
set color_highlight=black/light-gray

# Background
if background_image /boot/grub/splash.png; then
  set color_normal=white/black
  set color_highlight=yellow/black
else
  set menu_color_normal=cyan/blue
  set menu_color_highlight=white/blue
fi

# Main menu
menuentry "Gateway OS Live (Default)" {
    set gfxpayload=keep
    linux /boot/bzImage root=/dev/ram0 rw console=tty1 console=ttyS0,115200 quiet splash
    initrd /boot/rootfs.cpio.gz
}

menuentry "Install Gateway OS to Hard Drive" {
    set gfxpayload=keep
    linux /boot/bzImage root=/dev/ram0 rw console=tty1 console=ttyS0,115200 gateway.install=true
    initrd /boot/rootfs.cpio.gz
}

menuentry "Gateway OS Safe Mode" {
    set gfxpayload=keep
    linux /boot/bzImage root=/dev/ram0 rw console=tty1 console=ttyS0,115200 gateway.safe=true nosplash
    initrd /boot/rootfs.cpio.gz
}

menuentry "Rescue Mode" {
    set gfxpayload=keep
    linux /boot/bzImage root=/dev/ram0 rw console=tty1 console=ttyS0,115200 single rescue
    initrd /boot/rootfs.cpio.gz
}

submenu "Advanced Options" {
    menuentry "Gateway OS - Debug Mode" {
        set gfxpayload=keep
        linux /boot/bzImage root=/dev/ram0 rw console=tty1 console=ttyS0,115200 debug loglevel=7
        initrd /boot/rootfs.cpio.gz
    }
    
    menuentry "Gateway OS - Text Mode" {
        linux /boot/bzImage root=/dev/ram0 rw console=tty1 console=ttyS0,115200 text
        initrd /boot/rootfs.cpio.gz
    }
    
    menuentry "Gateway OS - No ACPI" {
        set gfxpayload=keep
        linux /boot/bzImage root=/dev/ram0 rw console=tty1 console=ttyS0,115200 acpi=off
        initrd /boot/rootfs.cpio.gz
    }
    
    menuentry "Memory Test (Memtest86+)" {
        linux16 /boot/memtest86+
    }
}

menuentry "Reboot" {
    reboot
}

menuentry "Power Off" {
    halt
}