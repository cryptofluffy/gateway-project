# Gateway OS ISO Boot Menu Configuration
# ISOLINUX/SYSLINUX configuration for bootable ISO

DEFAULT gateway_live
TIMEOUT 30
PROMPT 1

# Menu configuration
MENU TITLE Gateway OS - VPN Gateway Appliance
MENU BACKGROUND splash.png
MENU COLOR screen 37;40 #80ffffff #00000000 std
MENU COLOR border 30;44 #40ffffff #a0000000 std
MENU COLOR title 1;36;44 #ffaaffaa #a0000000 std
MENU COLOR sel 7;37;40 #e0ffffff #20ffffff all
MENU COLOR unsel 37;44 #50ffffff #a0000000 std
MENU COLOR help 37;40 #c0ffffff #00000000 std
MENU COLOR timeout_msg 37;40 #80ffffff #00000000 std
MENU COLOR timeout 1;37;40 #c0ffffff #00000000 std
MENU COLOR msg07 37;40 #90ffffff #a0000000 std
MENU COLOR tabmsg 31;40 #30ffffff #00000000 std

# Boot entries
LABEL gateway_live
    MENU LABEL ^Gateway OS Live (Default)
    MENU DEFAULT
    KERNEL /boot/bzImage
    APPEND initrd=/boot/rootfs.cpio.gz root=/dev/ram0 rw console=tty1 console=ttyS0,115200 quiet splash
    TEXT HELP
    Boot Gateway OS in live mode. No installation required.
    System runs entirely from RAM.
    ENDTEXT

LABEL gateway_install
    MENU LABEL ^Install Gateway OS to Hard Drive
    KERNEL /boot/bzImage
    APPEND initrd=/boot/rootfs.cpio.gz root=/dev/ram0 rw console=tty1 console=ttyS0,115200 gateway.install=true
    TEXT HELP
    Install Gateway OS permanently to hard drive.
    WARNING: This will erase the target drive!
    ENDTEXT

LABEL gateway_rescue
    MENU LABEL ^Rescue Mode
    KERNEL /boot/bzImage
    APPEND initrd=/boot/rootfs.cpio.gz root=/dev/ram0 rw console=tty1 console=ttyS0,115200 single rescue
    TEXT HELP
    Boot into rescue mode for system recovery.
    Provides root shell for troubleshooting.
    ENDTEXT

LABEL gateway_safe
    MENU LABEL ^Safe Mode (No Network)
    KERNEL /boot/bzImage
    APPEND initrd=/boot/rootfs.cpio.gz root=/dev/ram0 rw console=tty1 console=ttyS0,115200 gateway.safe=true
    TEXT HELP
    Boot in safe mode without automatic network configuration.
    Use for troubleshooting network issues.
    ENDTEXT

LABEL memtest
    MENU LABEL ^Memory Test
    KERNEL /boot/memtest86+
    TEXT HELP
    Run memory diagnostic test.
    ENDTEXT

LABEL reboot
    MENU LABEL ^Reboot
    COM32 reboot.c32
    TEXT HELP
    Restart the computer.
    ENDTEXT

LABEL poweroff
    MENU LABEL ^Power Off
    COM32 poweroff.c32
    TEXT HELP
    Shut down the computer.
    ENDTEXT

# Serial console support
SERIAL 0 115200

# Help text
F1 help.txt
F2 readme.txt

# Footer
MENU CMDLINE Gateway OS v1.0.0 - Press Tab to edit options