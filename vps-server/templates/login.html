<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - VPN Gateway Pro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 3rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            position: relative;
            overflow: hidden;
        }

        .login-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #667eea, #764ba2);
        }

        .logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo h1 {
            color: #333;
            font-size: 1.8rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .logo p {
            color: #666;
            margin-top: 0.5rem;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #333;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e1e5e9;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: white;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .login-btn {
            width: 100%;
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 1rem;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
        }

        .login-btn:disabled {
            opacity: 0.6;
            transform: none;
            cursor: not-allowed;
        }

        .error-message {
            background: #fee;
            border: 1px solid #fcc;
            color: #c66;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
            display: none;
        }

        .success-message {
            background: #efe;
            border: 1px solid #cfc;
            color: #6c6;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
            display: none;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 1.5rem;
        }

        .remember-me input[type="checkbox"] {
            width: auto;
        }

        .forgot-password {
            text-align: center;
            margin-top: 1rem;
        }

        .forgot-password a {
            color: #667eea;
            text-decoration: none;
            font-size: 0.9rem;
        }

        .forgot-password a:hover {
            text-decoration: underline;
        }

        .register-link {
            text-align: center;
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid #e1e5e9;
        }

        .register-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }

        .register-link a:hover {
            text-decoration: underline;
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 1rem;
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .demo-credentials {
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
        }

        .demo-credentials h4 {
            color: #495057;
            margin-bottom: 0.5rem;
        }

        .demo-credentials p {
            color: #6c757d;
            margin-bottom: 0.25rem;
        }

        .version-info {
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>🔒 VPN Gateway Pro</h1>
            <p>Secure Admin Access</p>
        </div>

        <div class="demo-credentials">
            <h4>Demo-Zugangsdaten:</h4>
            <p><strong>Admin:</strong> admin / admin123</p>
            <p><strong>User:</strong> testuser / testpass123</p>
        </div>

        <div id="error-message" class="error-message"></div>
        <div id="success-message" class="success-message"></div>

        <form id="login-form">
            <div class="form-group">
                <label for="username">Benutzername oder E-Mail</label>
                <input type="text" id="username" name="username" required autocomplete="username">
            </div>

            <div class="form-group">
                <label for="password">Passwort</label>
                <input type="password" id="password" name="password" required autocomplete="current-password">
            </div>

            <div class="remember-me">
                <input type="checkbox" id="remember" name="remember">
                <label for="remember">Angemeldet bleiben</label>
            </div>

            <button type="submit" class="login-btn" id="login-btn">
                🔐 Anmelden
            </button>
        </form>

        <div class="loading" id="loading">
            <div class="loading-spinner"></div>
            <p>Authentifizierung läuft...</p>
        </div>

        <div class="forgot-password">
            <a href="#" onclick="showForgotPassword()">Passwort vergessen?</a>
        </div>

        <div class="register-link">
            <p>Noch kein Konto? <a href="/register">Jetzt registrieren</a></p>
        </div>
    </div>

    <div class="version-info">
        v2.0.1 Pro
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const remember = document.getElementById('remember').checked;
            
            // UI aktualisieren
            showLoading(true);
            hideMessages();
            
            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        username: username,
                        password: password,
                        remember: remember,
                        ip_address: await getClientIP(),
                        user_agent: navigator.userAgent
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showSuccess('Anmeldung erfolgreich! Weiterleitung...');
                    
                    // Session-Token speichern
                    if (data.session_token) {
                        if (remember) {
                            localStorage.setItem('session_token', data.session_token);
                        } else {
                            sessionStorage.setItem('session_token', data.session_token);
                        }
                    }
                    
                    // Weiterleitung nach Dashboard
                    setTimeout(() => {
                        window.location.href = data.redirect_url || '/';
                    }, 1500);
                    
                } else {
                    showError(data.error || 'Anmeldung fehlgeschlagen');
                }
                
            } catch (error) {
                console.error('Login error:', error);
                showError('Verbindungsfehler. Bitte versuchen Sie es erneut.');
            }
            
            showLoading(false);
        });

        function showLoading(show) {
            const loading = document.getElementById('loading');
            const loginBtn = document.getElementById('login-btn');
            
            if (show) {
                loading.style.display = 'block';
                loginBtn.disabled = true;
                loginBtn.textContent = 'Wird verarbeitet...';
            } else {
                loading.style.display = 'none';
                loginBtn.disabled = false;
                loginBtn.textContent = '🔐 Anmelden';
            }
        }

        function showError(message) {
            const errorDiv = document.getElementById('error-message');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }

        function showSuccess(message) {
            const successDiv = document.getElementById('success-message');
            successDiv.textContent = message;
            successDiv.style.display = 'block';
        }

        function hideMessages() {
            document.getElementById('error-message').style.display = 'none';
            document.getElementById('success-message').style.display = 'none';
        }

        function showForgotPassword() {
            alert('Passwort-Reset-Funktion wird in der nächsten Version verfügbar sein.\n\nFür Unterstützung kontaktieren Sie bitte den Administrator.');
        }

        async function getClientIP() {
            try {
                const response = await fetch('/api/client-ip');
                const data = await response.json();
                return data.ip || 'unknown';
            } catch {
                return 'unknown';
            }
        }

        // Auto-Focus auf Username-Feld
        document.getElementById('username').focus();

        // Enter-Taste im Passwort-Feld
        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('login-form').dispatchEvent(new Event('submit'));
            }
        });

        // Demo-Login Buttons (für einfache Tests)
        document.addEventListener('DOMContentLoaded', function() {
            // Quick-Login für Demo
            document.addEventListener('keydown', function(e) {
                if (e.ctrlKey && e.shiftKey) {
                    if (e.key === 'A') {
                        // Ctrl+Shift+A = Admin Login
                        document.getElementById('username').value = 'admin';
                        document.getElementById('password').value = 'admin123';
                        e.preventDefault();
                    } else if (e.key === 'U') {
                        // Ctrl+Shift+U = User Login
                        document.getElementById('username').value = 'testuser';
                        document.getElementById('password').value = 'testpass123';
                        e.preventDefault();
                    }
                }
            });
        });
    </script>
</body>
</html>
