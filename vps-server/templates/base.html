<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}WireGuard Gateway{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/minimal-design-system.css') }}">
    {% block head %}{% endblock %}
</head>
<body>
    <header class="header">
        <div class="container flex items-center justify-between">
            <a href="/" class="nav-brand">
                🔒 WireGuard Gateway
            </a>
            
            <nav class="nav hidden md:flex">
                <a href="/" class="nav-link">Dashboard</a>
                <a href="/port-forwards" class="nav-link">Port Forwards</a>
            </nav>
            
            <!-- Mobile Menu Button -->
            <button id="mobile-menu-toggle" class="md:hidden btn btn-ghost">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                </svg>
            </button>
        </div>
        
        <!-- Mobile Menu -->
        <div id="mobile-menu" class="hidden md:hidden border-t border-color mt-2 pt-2">
            <div class="container">
                <div class="flex flex-col gap-sm">
                    <a href="/" class="nav-link">🏠 Dashboard</a>
                    <a href="/port-forwards" class="nav-link">🔌 Port Forwards</a>
                </div>
            </div>
        </div>
    </header>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <script>
        // Mobile Menu Toggle
        document.addEventListener('DOMContentLoaded', function() {
            const mobileMenuToggle = document.getElementById('mobile-menu-toggle');
            const mobileMenu = document.getElementById('mobile-menu');
            
            if (mobileMenuToggle && mobileMenu) {
                mobileMenuToggle.addEventListener('click', function() {
                    mobileMenu.classList.toggle('hidden');
                });
            }
        });

        // Auto-refresh Status alle 30 Sekunden
        setInterval(async () => {
            try {
                const response = await fetch('/api/status');
                const data = await response.json();
                
                // Status-Indikator aktualisieren
                const statusElement = document.getElementById('tunnel-status');
                if (statusElement) {
                    statusElement.className = data.interface.status === 'active' 
                        ? 'status-indicator status-online' 
                        : 'status-indicator status-offline';
                }
                
                // Client-Anzahl aktualisieren
                const clientCountElement = document.getElementById('client-count');
                if (clientCountElement) {
                    clientCountElement.textContent = data.clients.length;
                }
            } catch (error) {
                console.error('Fehler beim Aktualisieren des Status:', error);
            }
        }, 30000);
    </script>
</body>
</html>
