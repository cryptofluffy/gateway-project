<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}WireGuard Gateway{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <nav class="bg-blue-600 text-white shadow-lg">
        <div class="container mx-auto px-4 py-3">
            <div class="flex justify-between items-center">
                <h1 class="text-xl font-bold">WireGuard Gateway VPS</h1>
                <div class="space-x-4">
                    <a href="/" class="hover:text-blue-200 transition-colors">Dashboard</a>
                    <a href="/port-forwards" class="hover:text-blue-200 transition-colors">Port-Weiterleitungen</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-6">
        {% block content %}{% endblock %}
    </main>

    <script>
        // Auto-refresh Status alle 30 Sekunden
        setInterval(async () => {
            try {
                const response = await fetch('/api/status');
                const data = await response.json();
                
                // Status-Indikator aktualisieren
                const statusElement = document.getElementById('tunnel-status');
                if (statusElement) {
                    statusElement.className = data.interface.status === 'active' 
                        ? 'inline-block w-3 h-3 bg-green-500 rounded-full' 
                        : 'inline-block w-3 h-3 bg-red-500 rounded-full';
                }
                
                // Client-Anzahl aktualisieren
                const clientCountElement = document.getElementById('client-count');
                if (clientCountElement) {
                    clientCountElement.textContent = data.clients.length;
                }
            } catch (error) {
                console.error('Fehler beim Aktualisieren des Status:', error);
            }
        }, 30000);
    </script>
</body>
</html>
